name: Deploy to TimeWeb Cloud

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to TimeWeb via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: 5.129.199.33
        username: root
        key: ${{ secrets.TIMEWEB_SSH_KEY }}
        source: "."
        target: "/var/www/wedesignerz"
        rm: true
        strip_components: 0
        exclude: |
          .git
          .github
          README.md
          .gitignore
          .DS_Store
    
    - name: Verify deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 5.129.199.33
        username: root
        key: ${{ secrets.TIMEWEB_SSH_KEY }}
        script: |
          echo "Deployment completed!"
          ls -la /var/www/wedesignerz/
