name: Deploy to TimeWeb Cloud

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to TimeWeb via SSH Deploy
      uses: easingthemes/ssh-deploy@main
      with:
        SSH_PRIVATE_KEY: ${{ secrets.TIMEWEB_SSH_KEY }}
        REMOTE_HOST: 5.129.199.33
        REMOTE_USER: root
        REMOTE_PORT: 22
        SOURCE: "/"
        TARGET: "/var/www/wedesignerz"
        ARGS: "-avz --delete --exclude='.git' --exclude='.github' --exclude='README.md' --exclude='.gitignore'"
        SCRIPT_BEFORE: |
          echo "Starting deployment..."
        SCRIPT_AFTER: |
          echo "Deployment completed!"
          ls -la /var/www/wedesignerz/
